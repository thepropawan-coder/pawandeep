<!DOCTYPE html>
<html>
<head>
  <title>Instagram Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .header {
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-top: 10px;
      font-size: 15px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg,#ff416c,#ff4b2b);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .loading {
      display: none;
      margin-top: 20px;
    }

    .progress {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 10px;
      margin-top: 10px;
    }

    .bar {
      height: 8px;
      width: 0%;
      background: linear-gradient(90deg,#00dbde,#fc00ff);
      border-radius: 10px;
    }

    .scan-line {
      font-size: 13px;
      margin-top: 5px;
      color: #555;
    }

    .results {
      display: none;
      padding: 10px;
    }

    .viewer {
      display: flex;
      align-items: center;
      background: white;
      color: black;
      margin: 10px 20px;
      padding: 12px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .viewer img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 12px;
    }

    .verified {
      color: #0095f6;
      margin-left: 5px;
    }

    .share {
      text-align: center;
      margin-top: 20px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
      margin-top: 20px;
    }

  </style>
</head>

<body>

<div class="header">🔥 Insta Profile Viewer</div>

<div class="card" id="home">

  <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" width="80">

  <h3>Check Who Viewed Your Profile 😱</h3>

  <input type="text" id="username" placeholder="Enter Instagram username">

  <button onclick="start()">Check Now</button>

  <div class="loading" id="loading">

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div id="percent">0%</div>
    <div id="scan"></div>

  </div>

</div>

<div class="results" id="results">

  <h3 style="text-align:center;">👀 Top Viewers</h3>

  <div id="list"></div>

  <div class="share">
    <button onclick="share()">Share & Unlock 🔓</button>
  </div>

  <div class="footer">
    *For entertainment purposes only*
  </div>

</div>

<audio id="tick" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

let names = [
  "Cheema Y 😱",
  "Virat Kohli",
  "Elon Musk",
  "Cristiano Ronaldo",
  "Selena Gomez",
  "Shah Rukh Khan",
  "CarryMinati",
  "Priya Sharma",
  "Aman Singh",
  "Neha Verma"
];

function start() {
  let user = document.getElementById("username").value;

  if(user === "") {
    alert("Enter username!");
    return;
  }

  document.getElementById("loading").style.display = "block";

  let progress = 0;
  let bar = document.getElementById("bar");
  let percent = document.getElementById("percent");
  let scan = document.getElementById("scan");
  let sound = document.getElementById("tick");

  let interval = setInterval(() => {

    progress += 10;
    bar.style.width = progress + "%";
    percent.innerText = progress + "%";

    let random = names[Math.floor(Math.random()*names.length)];

    let line = document.createElement("div");
    line.className = "scan-line";
    line.innerText = "🔍 Checking: " + random;
    scan.appendChild(line);

    sound.play();

    if(progress >= 100) {
      clearInterval(interval);
      showResults();
    }

  }, 400);
}

function showResults() {

  document.getElementById("home").style.display = "none";
  document.getElementById("results").style.display = "block";

  let viewers = [
    {name:"Cheema Y 😱", img:"https://i.pravatar.cc/150?img=1"},
    {name:"Virat Kohli", img:"https://i.pravatar.cc/150?img=2"},
    {name:"Elon Musk", img:"https://i.pravatar.cc/150?img=3"},
    {name:"Cristiano Ronaldo", img:"https://i.pravatar.cc/150?img=4"},
    {name:"Selena Gomez", img:"https://i.pravatar.cc/150?img=5"}
  ];

  let html = "";

  viewers.forEach(v => {
    html += `
      <div class="viewer">
        <img src="${v.img}">
        <div>
          ${v.name} <span class="verified">✔</span><br>
          viewed your profile
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function share() {
  let text = "Check who viewed your profile 😱🔥";

  if(navigator.share) {
    navigator.share({
      title: "Profile Viewer",
      text: text,
      url: window.location.href
    });
  } else {
    alert("Share this with friends 😈");
  }
}

</script>

</body>
</html>
